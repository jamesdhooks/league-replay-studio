  <rect x="8" y="29" width="5" height="5" rx="1" fill="#3b82f6" opacity="0.7"/>
  <rect x="8" y="40" width="5" height="5" rx="1" fill="#3b82f6" opacity="0.7"/>
  <!-- Film strip sprockets - right -->
  <rect x="51" y="18" width="5" height="5" rx="1" fill="#3b82f6" opacity="0.7"/>
  <rect x="51" y="29" width="5" height="5" rx="1" fill="#3b82f6" opacity="0.7"/>
